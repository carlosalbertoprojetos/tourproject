{% extends 'dashboard.html' %}

{% load static %}

{% block title %} Evento {% endblock title %}

{% block dashboard %}

<div class="p-2">
    <h2 class="form-title">Novo Evento</h2>
    <form method="POST" enctype="multipart/form-data">
        <div class="col-md-12 mb-2">
            {% csrf_token %}
            {{ form.as_p }}
        </div>
        <div class="col-3 col-lg-1 float-start mt-2">
            <input type="submit" class="btn btn-primary btn-sm" value="Salvar">
        </div>
    </form>
</div>


{% endblock %}
