{% extends 'dashboard.html' %}

{% load static%}

{% block title %} Destino Turístico {% endblock title %}

{% block dashboard %}

<div class="p-2">
    <h2 class="form-title">Editar Destino Turístico</h2>
    <form method="POST" class="">
        {% csrf_token %}
        {{ form.errors }}
        <div class="row">{{ form.as_p }}</div>
        <div class="col-3 col-lg-1 mb-2">
            <input type="submit" class="btn btn-primary btn-sm" value="Salvar" />
        </div>
    </form>
</div>


{% endblock %}
